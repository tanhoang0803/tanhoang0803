<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- Space background gradient -->
    <radialGradient id="space" cx="50%" cy="50%" r="80%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#000005"/>
    </radialGradient>

    <!-- Planet gradient -->
    <radialGradient id="planet" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#6db3f2"/>
      <stop offset="40%" stop-color="#2980b9"/>
      <stop offset="70%" stop-color="#1a5276"/>
      <stop offset="100%" stop-color="#0a2744"/>
    </radialGradient>
    <radialGradient id="planetGlow" cx="50%" cy="50%" r="50%">
      <stop offset="60%" stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a6fa8" stop-opacity="0.4"/>
    </radialGradient>

    <!-- Clip for planet -->
    <clipPath id="planetClip">
      <circle cx="660" cy="200" r="90"/>
    </clipPath>

    <!-- Star glow filter -->
    <filter id="starGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="brightStar">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#space)"/>

  <!-- Stars - static small -->
  <g fill="white" opacity="0.6">
    <circle cx="30" cy="20" r="0.8"/><circle cx="75" cy="55" r="0.6"/><circle cx="120" cy="15" r="0.9"/>
    <circle cx="180" cy="40" r="0.7"/><circle cx="230" cy="10" r="0.8"/><circle cx="290" cy="60" r="0.6"/>
    <circle cx="350" cy="25" r="0.9"/><circle cx="410" cy="50" r="0.7"/><circle cx="470" cy="18" r="0.8"/>
    <circle cx="530" cy="45" r="0.6"/><circle cx="600" cy="22" r="0.9"/><circle cx="740" cy="35" r="0.7"/>
    <circle cx="55" cy="100" r="0.7"/><circle cx="160" cy="90" r="0.8"/><circle cx="270" cy="110" r="0.6"/>
    <circle cx="380" cy="95" r="0.9"/><circle cx="490" cy="115" r="0.7"/><circle cx="720" cy="80" r="0.8"/>
    <circle cx="40" cy="200" r="0.6"/><circle cx="140" cy="180" r="0.8"/><circle cx="250" cy="220" r="0.7"/>
    <circle cx="370" cy="190" r="0.9"/><circle cx="500" cy="210" r="0.6"/><circle cx="580" cy="175" r="0.8"/>
    <circle cx="10" cy="300" r="0.7"/><circle cx="90" cy="320" r="0.8"/><circle cx="200" cy="290" r="0.6"/>
    <circle cx="320" cy="310" r="0.9"/><circle cx="450" cy="280" r="0.7"/><circle cx="560" cy="330" r="0.8"/>
    <circle cx="50" cy="370" r="0.6"/><circle cx="170" cy="355" r="0.8"/><circle cx="310" cy="380" r="0.7"/>
    <circle cx="430" cy="360" r="0.9"/><circle cx="700" cy="300" r="0.7"/><circle cx="780" cy="150" r="0.6"/>
    <circle cx="760" cy="250" r="0.8"/><circle cx="790" cy="350" r="0.7"/><circle cx="710" cy="380" r="0.6"/>
  </g>

  <!-- Bright twinkling stars -->
  <g filter="url(#brightStar)">
    <circle cx="680" cy="60" r="2.5" fill="white">
      <animate attributeName="opacity" values="1;0.2;1" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2.5;1.5;2.5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="720" cy="100" r="2" fill="#a0d8ef">
      <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="150" r="1.8" fill="white">
      <animate attributeName="opacity" values="1;0.1;1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="340" r="2" fill="#d0e8ff">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="550" cy="70" r="1.5" fill="white">
      <animate attributeName="opacity" values="1;0.2;1" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Planet body -->
  <circle cx="660" cy="200" r="90" fill="url(#planet)"/>

  <!-- Planet land masses -->
  <g clip-path="url(#planetClip)" opacity="0.7">
    <ellipse cx="640" cy="170" rx="35" ry="22" fill="#27ae60" opacity="0.8"/>
    <ellipse cx="680" cy="200" rx="28" ry="18" fill="#2ecc71" opacity="0.7"/>
    <ellipse cx="645" cy="225" rx="20" ry="12" fill="#27ae60" opacity="0.75"/>
    <ellipse cx="695" cy="165" rx="15" ry="10" fill="#1e8449" opacity="0.8"/>
    <ellipse cx="625" cy="210" rx="18" ry="12" fill="#2ecc71" opacity="0.6"/>
  </g>

  <!-- Planet atmosphere glow -->
  <circle cx="660" cy="200" r="90" fill="none" stroke="#4fc3f7" stroke-width="3" opacity="0.3"/>
  <circle cx="660" cy="200" r="95" fill="none" stroke="#81d4fa" stroke-width="2" opacity="0.15"/>

  <!-- Planet orbit ring -->
  <ellipse cx="660" cy="200" rx="120" ry="20" fill="none" stroke="#4fc3f7" stroke-width="1.5" opacity="0.25"
    transform="rotate(-15, 660, 200)"/>

  <!-- Shooting star animation -->
  <line x1="-20" y1="80" x2="0" y2="82" stroke="white" stroke-width="1.5" opacity="0">
    <animate attributeName="x1" values="-20;820" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="x2" values="0;840" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y1" values="80;200" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="y2" values="82;202" dur="4s" repeatCount="indefinite" begin="1s"/>
    <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="1s"/>
  </line>
  <line x1="-20" y1="300" x2="0" y2="302" stroke="white" stroke-width="1" opacity="0">
    <animate attributeName="x1" values="-20;820" dur="5s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="x2" values="0;840" dur="5s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="y1" values="300;370" dur="5s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="y2" values="302;372" dur="5s" repeatCount="indefinite" begin="6s"/>
    <animate attributeName="opacity" values="0;0.8;0.8;0" dur="5s" repeatCount="indefinite" begin="6s"/>
  </line>

  <!-- Main text -->
  <text x="60" y="175" font-family="'Courier New', monospace" font-size="26" font-weight="bold" fill="white" filter="url(#textGlow)">
    Hi Aliens! 👋
  </text>
  <text x="60" y="215" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#a0d8ef">
    I'm TanQHoang
  </text>
  <text x="60" y="245" font-family="'Courier New', monospace" font-size="16" fill="#7fc8e8">
    from the Earth.
  </text>

  <!-- Typing cursor blink -->
  <rect x="280" y="228" width="2" height="18" fill="#7fc8e8">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <!-- Tech icons row (using text/unicode approximations as SVG icons) -->
  <!-- JavaScript -->
  <rect x="60" y="275" width="36" height="36" rx="4" fill="#F7DF1E"/>
  <text x="65" y="304" font-family="monospace" font-size="18" font-weight="bold" fill="#000">JS</text>

  <!-- React -->
  <rect x="108" y="275" width="36" height="36" rx="4" fill="#20232A"/>
  <circle cx="126" cy="293" r="5" fill="none" stroke="#61DAFB" stroke-width="1.5"/>
  <ellipse cx="126" cy="293" rx="14" ry="5" fill="none" stroke="#61DAFB" stroke-width="1.5"/>
  <ellipse cx="126" cy="293" rx="14" ry="5" fill="none" stroke="#61DAFB" stroke-width="1.5" transform="rotate(60,126,293)"/>
  <ellipse cx="126" cy="293" rx="14" ry="5" fill="none" stroke="#61DAFB" stroke-width="1.5" transform="rotate(120,126,293)"/>

  <!-- Vue -->
  <rect x="156" y="275" width="36" height="36" rx="4" fill="#35495E"/>
  <polygon points="174,280 182,294 166,294" fill="none" stroke="#42b883" stroke-width="2"/>
  <polygon points="174,284 179,293 169,293" fill="#42b883"/>

  <!-- Node.js -->
  <rect x="204" y="275" width="36" height="36" rx="4" fill="#339933"/>
  <text x="207" y="299" font-family="monospace" font-size="10" font-weight="bold" fill="white">Node</text>

  <!-- TypeScript -->
  <rect x="252" y="275" width="36" height="36" rx="4" fill="#3178C6"/>
  <text x="257" y="304" font-family="monospace" font-size="18" font-weight="bold" fill="white">TS</text>

  <!-- Docker -->
  <rect x="300" y="275" width="36" height="36" rx="4" fill="#2496ED"/>
  <text x="302" y="298" font-family="monospace" font-size="9" font-weight="bold" fill="white">Docker</text>

  <!-- GitHub -->
  <rect x="348" y="275" width="36" height="36" rx="4" fill="#181717"/>
  <circle cx="366" cy="291" r="10" fill="none" stroke="white" stroke-width="1.5"/>
  <path d="M361,288 Q366,283 371,288 L371,297 Q368,299 366,298 Q364,299 361,297 Z" fill="white" opacity="0.8"/>

  <!-- Floating dots animation -->
  <circle cx="500" cy="150" r="2" fill="#4fc3f7" opacity="0.5">
    <animate attributeName="cy" values="150;140;150" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="520" cy="160" r="1.5" fill="#81d4fa" opacity="0.4">
    <animate attributeName="cy" values="160;150;160" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="505" cy="175" r="1" fill="#b3e5fc" opacity="0.3">
    <animate attributeName="cy" values="175;165;175" dur="3.5s" repeatCount="indefinite"/>
  </circle>
</svg>
